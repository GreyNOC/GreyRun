name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install GreyRun (with extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full]"

      - name: Byte-compile
        run: python -m compileall -q greyrun   # directory arg works on all shells (no glob)

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Smoke-test the CLI
        run: |
          greyrun --version
          gr --version
